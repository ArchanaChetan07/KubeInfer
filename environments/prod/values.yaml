# environments/prod/values.yaml
# Production overrides — full HA, strict security, production model.
# Every value here is deliberate. Read the comments before changing anything.

global:
  environment: prod

model:
  name: meta-llama/Llama-3.1-70B-Instruct   # ⚙️  Your production model
  dtype: bfloat16
  gpuMemoryUtilization: "0.92"
  maxModelLen: 8192
  disableLogRequests: true    # Reduces log volume; enable temporarily for debugging
  enablePrefixCaching: true   # Free throughput improvement for repeated prompts

engine:
  image:
    repository: vllm/vllm-openai
    # ⚙️  ALWAYS pin to a specific digest in production — "latest" is not acceptable.
    # Get the digest: docker inspect vllm/vllm-openai:v0.6.6 --format='{{index .RepoDigests 0}}'
    tag: "v0.6.6"
    pullPolicy: IfNotPresent

  # 70B on 4×A100 80GB (tensor parallel across 4 GPUs per replica)
  # For 8B: replicaCount: 3, gpuCount: 1, tensorParallelSize: 1
  replicaCount: 2             # Minimum 2 replicas for HA
  gpuCount: 4
  tensorParallelSize: 4

  resources:
    requests:
      cpu: "32"
      memory: "128Gi"
    limits:
      cpu: "64"
      memory: "256Gi"

  nodeSelector:
    accelerator: nvidia
    # Target A100 nodes specifically — don't accidentally land on T4 nodes
    nvidia.com/gpu.product: "NVIDIA-A100-SXM4-80GB"

  extraEnv:
    - name: VLLM_ATTENTION_BACKEND
      value: FLASH_ATTN      # Flash Attention 2 on A100/H100

  # Give the 70B model extra startup time
  startupProbe:
    httpGet:
      path: /health
      port: 8000
    failureThreshold: 90     # 90 × 10 s = 15 minutes
    periodSeconds: 10
    timeoutSeconds: 5

modelCache:
  size: 200Gi
  accessMode: ReadWriteMany
  # ⚙️  Use a production-grade shared StorageClass:
  # AWS: efs-sc   GCP: filestore-csi   Azure: azurefile   Bare metal: nfs/cephfs
  storageClass: "efs-sc"

hpa:
  enabled: true
  minReplicas: 2             # Never below 2 in prod — single replica = single point of failure
  maxReplicas: 12
  # Lower threshold = more responsive but more expensive. 5 is a good starting point.
  queueDepthThreshold: "5"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 600  # 10 minutes before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300

pdb:
  enabled: true
  minAvailable: 2            # Always keep 2 engines up (matches minReplicas)

service:
  type: ClusterIP            # Use ClusterIP + Ingress for TLS in prod (not raw LoadBalancer)

ingress:
  enabled: true
  className: nginx
  host: api.yourdomain.com  # ⚙️  Your production domain
  tls:
    enabled: true
    secretName: vllm-tls-prod
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/limit-rps: "500"
    cert-manager.io/cluster-issuer: letsencrypt-prod

networkPolicy:
  enabled: true

router:
  enabled: true
  replicaCount: 2            # Router HA in prod
  strategy: session          # Session affinity for KV cache reuse

metallb:
  enabled: false             # Disable on cloud Kubernetes (AWS/GCP/Azure provide LBs)

openWebui:
  enabled: true
  replicaCount: 2
  resources:
    requests:
      cpu: "1"
      memory: "1Gi"
    limits:
      cpu: "4"
      memory: "4Gi"
  storage:
    size: 20Gi
    storageClass: "gp3"

serviceMonitor:
  enabled: true
  namespace: monitoring
  interval: 10s
  scrapeTimeout: 8s

prometheusAdapter:
  enabled: true

alerting:
  enabled: true

rbac:
  create: true
  # AWS IRSA example (for EKS with IRSA for secrets manager access)
  # serviceAccountAnnotations:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/vllm-prod-role
